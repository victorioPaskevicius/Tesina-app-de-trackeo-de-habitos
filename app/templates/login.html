<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="../static/index.css" />
    <link rel="stylesheet" href="../static/login/login.css" />
  </head>
  <body>
    <h1>Iniciar sesión</h1>
    <form id="loginForm" method="POST">
      <label for="email">Email:</label><br />
      <input type="email" id="inputMail" name="email" /><br /><br />

      <label for="password">Contraseña:</label><br />
      <input type="password" id="inputPass" name="password" /><br /><br />

      <input type="submit" value="Ingresar" />
      <div class="error_container" id="errorContainer"></div>
    </form>

    <script src="../static/login/login.js"></script>
  </body>
</html>
